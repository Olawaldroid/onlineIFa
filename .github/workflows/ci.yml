name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build does not connect to a database (DB-backed pages are dynamic),
          # but Prisma needs the variable to be present.
          DATABASE_URL: "postgresql://user:pass@localhost:5432/online_ifa?schema=public"
          AUTH_SECRET: "ci-build-secret"
